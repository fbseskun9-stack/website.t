<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedang Dalam Pengecekan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Animasi putar untuk loader */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 3s linear infinite;
        }
    </style>
</head>
<body class="bg-[#48b5a3] min-h-screen flex justify-center items-center py-6 px-4 font-sans">

    <div class="max-w-md w-full">
        <div class="bg-white rounded-3xl shadow-2xl p-8 text-center flex flex-col items-center">
            
            <div class="relative w-48 h-48 mb-8">
                <div class="absolute inset-0 border-[12px] border-gray-100 rounded-full"></div>
                <div class="absolute inset-0 border-[12px] border-t-sky-500 border-r-transparent border-b-transparent border-l-transparent rounded-full animate-spin-slow"></div>
                
                <div class="absolute inset-0 flex flex-col justify-center items-center">
                    <span class="text-sky-500 font-black text-2xl tracking-tighter">PROCESSING</span>
                    <span class="text-gray-400 text-sm italic">please wait...</span>
                </div>
            </div>

            <h2 class="text-3xl font-black text-gray-800 mb-4">Sedang Dalam Pengecekan...</h2>
            
            <p class="text-gray-600 leading-relaxed mb-8">
                Jika anda telah diterima kami akan mengirimkan pesan melalui Telegram
            </p>
            
            <p class="text-gray-500 font-medium mb-10">Terima kasih!</p>

            <a href="index.html" class="w-full bg-[#0d233a] hover:bg-black text-white font-bold py-4 rounded-xl text-lg shadow-lg transition-colors inline-block">
                Kembali ke Beranda
            </a>
        </div>
    </div>

</body>
</html>
